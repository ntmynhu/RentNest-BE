version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rentnest_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rentnest_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: rentnest_app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/rentnest_db
    depends_on:
      - postgres

volumes:
  postgres_data:
